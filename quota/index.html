<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quota Tracker FY26 — Afonso Santos</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #262626;
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --accent: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        #auth-gate {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 24px;
        }
        .auth-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 48px 40px; max-width: 380px;
            width: 100%; text-align: center;
        }
        .auth-box h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 8px; }
        .auth-box .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 28px; }
        .auth-input {
            width: 100%; padding: 12px 16px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text);
            font-family: inherit; font-size: 0.95rem; outline: none;
        }
        .auth-input:focus { border-color: var(--accent); }
        .auth-input.error { border-color: #ef4444; }
        .auth-btn {
            width: 100%; padding: 12px; margin-top: 12px; background: var(--accent);
            color: #fff; border: none; border-radius: 8px; font-family: inherit;
            font-size: 0.95rem; font-weight: 500; cursor: pointer;
        }
        .auth-btn:hover { opacity: 0.9; }
        .auth-error { color: #ef4444; font-size: 0.82rem; margin-top: 10px; display: none; }
        #app { display: none; }
        .loading-msg {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace; font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- PASSWORD GATE -->
    <div id="auth-gate">
        <div class="auth-box">
            <h2>Quota Tracker</h2>
            <p class="subtitle">Enter password to continue</p>
            <input type="password" id="pwd" class="auth-input" placeholder="Password" autofocus>
            <button class="auth-btn" onclick="checkAuth()">Enter</button>
            <p class="auth-error" id="auth-err">Wrong password. Try again.</p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="app"><div class="loading-msg">Loading dashboard...</div></div>

    <script>
        const HASH = 'a1d06bbb7f46018d54564d989ec2e32d7892e26a0db8328e15bdaa723dd2d746';
        async function sha256(str) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }
        async function checkAuth() {
            const pwd = document.getElementById('pwd').value;
            const hash = await sha256(pwd);
            if (hash === HASH) {
                sessionStorage.setItem('authed', '1');
                showContent();
            } else {
                document.getElementById('pwd').classList.add('error');
                document.getElementById('auth-err').style.display = 'block';
            }
        }
        function showContent() {
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }
        if (sessionStorage.getItem('authed') === '1') showContent();
        document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') checkAuth(); });
    </script>

    <!-- React via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Shim: lucide-react UMD expects window.react (lowercase) -->
    <script>window.react = window.React;</script>
    <script src="https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { AlertTriangle, CheckCircle2, Clock, Flame, Activity } = LucideReact;

        const QUOTA = 1_800_000;
        const quarters = ['Q1', 'Q2', 'Q3', 'Q4'];
        const quarterLabels = { Q1: 'Q1 · Feb–Apr', Q2: 'Q2 · May–Jul', Q3: 'Q3 · Aug–Oct', Q4: 'Q4 · Nov–Jan' };

        const fmtMoney = (n) => {
            if (n >= 1_000_000) return `$${(n / 1_000_000).toFixed(2)}M`;
            if (n >= 1_000) return `$${Math.round(n / 1_000)}K`;
            return `$${n}`;
        };

        const signalConfig = {
            hot:    { label: 'HOT',    color: '#10b981', bg: 'rgba(16,185,129,0.12)' },
            warm:   { label: 'WARM',   color: '#f59e0b', bg: 'rgba(245,158,11,0.12)' },
            cold:   { label: 'COLD',   color: '#64748b', bg: 'rgba(100,116,139,0.12)' },
            closed: { label: 'CLOSED', color: '#a78bfa', bg: 'rgba(167,139,250,0.12)' },
        };

        function Stat({ label, value, sub, accent }) {
            return (
                <div>
                    <div style={{ fontSize: '10px', letterSpacing: '0.18em', color: '#64748b', marginBottom: '6px' }}>{label}</div>
                    <div style={{ fontSize: '32px', fontWeight: 600, color: accent || '#f1f5f9', fontFamily: '"Fraunces", Georgia, serif', lineHeight: 1 }}>{value}</div>
                    <div style={{ fontSize: '11px', color: '#94a3b8', marginTop: '4px' }}>{sub}</div>
                </div>
            );
        }

        function LegendDot({ color, label, striped }) {
            return (
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: '6px' }}>
                    <span style={{ width: '10px', height: '10px', background: striped ? `repeating-linear-gradient(45deg, ${color}, ${color} 2px, transparent 2px, transparent 4px)` : color, border: striped ? `1px solid ${color}` : 'none', display: 'inline-block', borderRadius: '1px' }} />
                    {label}
                </span>
            );
        }

        function QuotaDashboard({ deals, metadata }) {
            const [selectedQuarter, setSelectedQuarter] = useState('all');
            const [sortBy, setSortBy] = useState('weighted');

            const stats = useMemo(() => {
                const won = deals.filter(d => d.status === 'won');
                const lost = deals.filter(d => d.status === 'lost');
                const open = deals.filter(d => d.status === 'open');
                const wonAmount = won.reduce((s, d) => s + d.amount, 0);
                const openTCV = open.reduce((s, d) => s + d.amount, 0);
                const weightedPipeline = open.reduce((s, d) => s + d.amount * (d.confidence || 0), 0);
                const forecast = wonAmount + weightedPipeline;
                const attainment = wonAmount / QUOTA;
                const forecastAttainment = forecast / QUOTA;
                const gap = QUOTA - wonAmount;
                return { won, lost, open, wonAmount, openTCV, weightedPipeline, forecast, attainment, forecastAttainment, gap };
            }, [deals]);

            const quarterStats = useMemo(() => {
                return quarters.map(q => {
                    const qDeals = deals.filter(d => d.quarter === q);
                    const qWon = qDeals.filter(d => d.status === 'won').reduce((s, d) => s + d.amount, 0);
                    const qOpen = qDeals.filter(d => d.status === 'open').reduce((s, d) => s + d.amount, 0);
                    const qWeighted = qDeals.filter(d => d.status === 'open').reduce((s, d) => s + d.amount * (d.confidence || 0), 0);
                    const qDealCount = qDeals.filter(d => d.status === 'open').length;
                    return { quarter: q, won: qWon, open: qOpen, weighted: qWeighted, deals: qDeals, openCount: qDealCount };
                });
            }, [deals]);

            const filteredDeals = useMemo(() => {
                let list = selectedQuarter === 'all' ? deals : deals.filter(d => d.quarter === selectedQuarter);
                list = list.filter(d => d.status === 'open');
                if (sortBy === 'weighted') return [...list].sort((a, b) => (b.amount * (b.confidence||0)) - (a.amount * (a.confidence||0)));
                if (sortBy === 'amount') return [...list].sort((a, b) => b.amount - a.amount);
                if (sortBy === 'confidence') return [...list].sort((a, b) => (b.confidence||0) - (a.confidence||0));
                return list;
            }, [selectedQuarter, sortBy, deals]);

            const maxQuarterValue = Math.max(...quarterStats.map(q => q.won + q.weighted), 1);
            const lastUpdated = metadata?.lastUpdated || 'unknown';

            return (
                <div style={{ minHeight: '100vh', background: 'linear-gradient(180deg, #0a0e1a 0%, #0f1420 100%)', color: '#e2e8f0', fontFamily: '"JetBrains Mono", "SF Mono", Menlo, monospace', padding: '32px 24px' }}>
                    <div style={{ maxWidth: '1280px', margin: '0 auto' }}>

                        {/* Header */}
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '40px', paddingBottom: '24px', borderBottom: '1px solid rgba(148,163,184,0.1)' }}>
                            <div>
                                <div style={{ fontSize: '11px', letterSpacing: '0.2em', color: '#64748b', marginBottom: '8px' }}>AFONSO SANTOS · LATAM & IBERIA</div>
                                <h1 style={{ fontFamily: '"Fraunces", "Playfair Display", Georgia, serif', fontSize: '48px', fontWeight: 300, margin: 0, letterSpacing: '-0.02em', color: '#f1f5f9' }}>
                                    Quota Tracker <span style={{ color: '#10b981' }}>FY26</span>
                                </h1>
                                <div style={{ fontSize: '12px', color: '#64748b', marginTop: '8px' }}>Feb 1, 2026 → Jan 31, 2027 · Updated {lastUpdated}</div>
                            </div>
                            <div style={{ textAlign: 'right' }}>
                                <div style={{ fontSize: '11px', letterSpacing: '0.15em', color: '#64748b' }}>ANNUAL QUOTA</div>
                                <div style={{ fontSize: '32px', fontWeight: 600, color: '#f1f5f9', fontFamily: '"Fraunces", Georgia, serif' }}>${(QUOTA / 1_000_000).toFixed(1)}M</div>
                                <div style={{ display: 'flex', gap: '12px', marginTop: '8px', alignItems: 'center' }}>
                                    <a href="/" style={{ fontSize: '11px', color: '#64748b', textDecoration: 'none' }}>← Back to Hub</a>
                                    <button onClick={() => { sessionStorage.removeItem('authed'); window.location.reload(); }} style={{ fontSize: '11px', background: 'none', border: '1px solid rgba(148,163,184,0.2)', color: '#64748b', padding: '3px 10px', borderRadius: '3px', cursor: 'pointer', fontFamily: 'inherit' }}>Logout</button>
                                </div>
                            </div>
                        </div>

                        {/* Hero stats */}
                        <div style={{ background: 'linear-gradient(135deg, rgba(16,185,129,0.06) 0%, rgba(15,20,32,0.6) 100%)', border: '1px solid rgba(16,185,129,0.2)', borderRadius: '4px', padding: '32px', marginBottom: '24px' }}>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: '32px', marginBottom: '28px' }}>
                                <Stat label="Closed Won" value={fmtMoney(stats.wonAmount)} sub={`${stats.won.length} deals`} accent="#10b981" />
                                <Stat label="Attainment" value={`${(stats.attainment * 100).toFixed(1)}%`} sub={`Gap: ${fmtMoney(stats.gap)}`} accent="#10b981" />
                                <Stat label="Weighted Pipeline" value={fmtMoney(stats.weightedPipeline)} sub={`from ${fmtMoney(stats.openTCV)} TCV`} accent="#f59e0b" />
                                <Stat label="Forecast (Won + Weighted)" value={fmtMoney(stats.forecast)} sub={`${(stats.forecastAttainment * 100).toFixed(0)}% of quota`} accent={stats.forecastAttainment >= 1 ? '#10b981' : '#f59e0b'} />
                            </div>
                            <div>
                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '10px', letterSpacing: '0.15em', color: '#64748b', marginBottom: '8px' }}>
                                    <span>$0</span><span>50%</span><span>100% · ${(QUOTA / 1_000_000).toFixed(1)}M</span>
                                </div>
                                <div style={{ height: '14px', background: 'rgba(148,163,184,0.08)', borderRadius: '2px', overflow: 'hidden', position: 'relative', border: '1px solid rgba(148,163,184,0.1)' }}>
                                    <div style={{ position: 'absolute', left: 0, top: 0, height: '100%', width: `${(stats.attainment * 100).toFixed(2)}%`, background: 'linear-gradient(90deg, #10b981, #34d399)', boxShadow: '0 0 20px rgba(16,185,129,0.4)' }} />
                                    <div style={{ position: 'absolute', left: `${(stats.attainment * 100).toFixed(2)}%`, top: 0, height: '100%', width: `${Math.min((stats.weightedPipeline / QUOTA) * 100, 100 - stats.attainment * 100).toFixed(2)}%`, background: 'repeating-linear-gradient(45deg, rgba(245,158,11,0.4), rgba(245,158,11,0.4) 4px, rgba(245,158,11,0.6) 4px, rgba(245,158,11,0.6) 8px)' }} />
                                </div>
                                <div style={{ display: 'flex', gap: '20px', marginTop: '10px', fontSize: '11px', color: '#94a3b8' }}>
                                    <LegendDot color="#10b981" label={`Won · ${fmtMoney(stats.wonAmount)}`} />
                                    <LegendDot color="#f59e0b" label={`Weighted pipeline · ${fmtMoney(stats.weightedPipeline)}`} striped />
                                    <span style={{ marginLeft: 'auto', color: '#64748b' }}>
                                        {stats.forecastAttainment >= 1
                                            ? `✓ Forecast covers quota with ${fmtMoney(stats.forecast - QUOTA)} cushion`
                                            : `⚠ Forecast short by ${fmtMoney(QUOTA - stats.forecast)} — need to add or accelerate pipeline`}
                                    </span>
                                </div>
                            </div>
                        </div>

                        {/* Quarterly breakdown */}
                        <div style={{ background: 'rgba(15,20,32,0.4)', border: '1px solid rgba(148,163,184,0.08)', borderRadius: '4px', padding: '28px', marginBottom: '24px' }}>
                            <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: '24px' }}>
                                <h2 style={{ fontFamily: '"Fraunces", Georgia, serif', fontSize: '24px', fontWeight: 400, margin: 0, color: '#f1f5f9' }}>By Quarter</h2>
                                <div style={{ fontSize: '10px', letterSpacing: '0.15em', color: '#64748b' }}>QUOTA / 4 = ${(QUOTA / 4 / 1000).toFixed(0)}K PER QUARTER</div>
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '16px' }}>
                                {quarterStats.map(q => {
                                    const total = q.won + q.weighted;
                                    const targetPerQ = QUOTA / 4;
                                    const pctOfTarget = (total / targetPerQ) * 100;
                                    return (
                                        <div key={q.quarter} style={{ background: 'rgba(10,14,26,0.6)', border: `1px solid ${selectedQuarter === q.quarter ? '#10b981' : 'rgba(148,163,184,0.1)'}`, borderRadius: '3px', padding: '20px', cursor: 'pointer', transition: 'all 0.2s' }}
                                            onClick={() => setSelectedQuarter(selectedQuarter === q.quarter ? 'all' : q.quarter)}>
                                            <div style={{ fontSize: '10px', letterSpacing: '0.15em', color: '#64748b', marginBottom: '4px' }}>{quarterLabels[q.quarter]}</div>
                                            <div style={{ fontSize: '24px', fontWeight: 600, color: '#f1f5f9', fontFamily: '"Fraunces", Georgia, serif' }}>{fmtMoney(total)}</div>
                                            <div style={{ fontSize: '11px', color: pctOfTarget >= 100 ? '#10b981' : '#f59e0b', marginBottom: '12px' }}>{pctOfTarget.toFixed(0)}% of {fmtMoney(targetPerQ)} target</div>
                                            <div style={{ height: '8px', background: 'rgba(148,163,184,0.08)', borderRadius: '1px', overflow: 'hidden', display: 'flex', marginBottom: '12px' }}>
                                                <div style={{ width: `${(q.won / maxQuarterValue) * 100}%`, background: '#10b981' }} />
                                                <div style={{ width: `${(q.weighted / maxQuarterValue) * 100}%`, background: 'repeating-linear-gradient(45deg, #f59e0b, #f59e0b 3px, #d97706 3px, #d97706 6px)' }} />
                                            </div>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '10px', color: '#94a3b8' }}>
                                                <span>Won {fmtMoney(q.won)}</span><span>+W {fmtMoney(q.weighted)}</span>
                                            </div>
                                            <div style={{ fontSize: '10px', color: '#64748b', marginTop: '4px' }}>{q.openCount} open · {fmtMoney(q.open)} TCV</div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Closed deals */}
                        <div style={{ background: 'rgba(15,20,32,0.4)', border: '1px solid rgba(148,163,184,0.08)', borderRadius: '4px', padding: '28px', marginBottom: '24px' }}>
                            <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: '20px', flexWrap: 'wrap', gap: '12px' }}>
                                <h2 style={{ fontFamily: '"Fraunces", Georgia, serif', fontSize: '24px', fontWeight: 400, margin: 0, color: '#f1f5f9' }}>
                                    Closed Deals
                                    <span style={{ fontSize: '12px', color: '#64748b', marginLeft: '12px', fontFamily: '"JetBrains Mono", monospace' }}>
                                        {stats.won.length + stats.lost.length} total · {stats.won.length} won · {stats.lost.length} lost
                                    </span>
                                </h2>
                                <div style={{ display: 'flex', gap: '16px', fontSize: '11px' }}>
                                    <div><span style={{ color: '#64748b' }}>Win rate · </span><span style={{ color: '#10b981', fontWeight: 600 }}>{((stats.won.length / Math.max(stats.won.length + stats.lost.length, 1)) * 100).toFixed(0)}%</span></div>
                                    <div><span style={{ color: '#64748b' }}>Lost TCV · </span><span style={{ color: '#ef4444', fontWeight: 600 }}>{fmtMoney(stats.lost.reduce((s, d) => s + d.amount, 0))}</span></div>
                                </div>
                            </div>
                            {/* Won */}
                            <div style={{ marginBottom: '24px' }}>
                                <div style={{ fontSize: '10px', letterSpacing: '0.18em', color: '#10b981', marginBottom: '12px', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '8px' }}>
                                    <CheckCircle2 size={12} /> WON · {fmtMoney(stats.wonAmount)}
                                </div>
                                <div style={{ display: 'grid', gridTemplateColumns: '2fr 80px 110px 110px 1fr', gap: '16px', padding: '10px 8px', borderBottom: '1px solid rgba(148,163,184,0.1)', fontSize: '10px', letterSpacing: '0.15em', color: '#64748b' }}>
                                    <div>DEAL</div><div>QTR</div><div style={{ textAlign: 'right' }}>AMOUNT</div><div style={{ textAlign: 'right' }}>CLOSE DATE</div><div>NOTE</div>
                                </div>
                                {stats.won.map((d, i) => (
                                    <div key={i} style={{ display: 'grid', gridTemplateColumns: '2fr 80px 110px 110px 1fr', gap: '16px', padding: '14px 8px', borderBottom: '1px solid rgba(148,163,184,0.06)', fontSize: '13px', alignItems: 'center', background: 'rgba(16,185,129,0.02)' }}>
                                        <div style={{ color: '#f1f5f9', fontWeight: 500, display: 'flex', alignItems: 'center', gap: '8px' }}><span style={{ color: '#10b981', fontSize: '14px' }}>✓</span>{d.name}</div>
                                        <div style={{ color: '#94a3b8', fontSize: '11px' }}>{d.quarter}</div>
                                        <div style={{ textAlign: 'right', color: '#10b981', fontWeight: 600 }}>{fmtMoney(d.amount)}</div>
                                        <div style={{ textAlign: 'right', color: '#94a3b8', fontSize: '11px' }}>{new Date(d.closeDate + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}</div>
                                        <div style={{ fontSize: '11px', color: '#64748b' }}>{d.signalNote}</div>
                                    </div>
                                ))}
                                {stats.won.length > 0 && (
                                    <div style={{ marginTop: '12px', padding: '12px', background: 'rgba(16,185,129,0.04)', borderLeft: '2px solid #10b981', fontSize: '11px', color: '#cbd5e1' }}>
                                        <strong style={{ color: '#10b981' }}>Avg deal size:</strong> {fmtMoney(stats.wonAmount / stats.won.length)} ·{' '}
                                        <strong style={{ color: '#10b981' }}>Largest:</strong> {stats.won.reduce((max, d) => d.amount > max.amount ? d : max, stats.won[0]).name} ({fmtMoney(stats.won.reduce((max, d) => d.amount > max.amount ? d : max, stats.won[0]).amount)})
                                    </div>
                                )}
                            </div>
                            {/* Lost */}
                            {stats.lost.length > 0 && (
                                <div>
                                    <div style={{ fontSize: '10px', letterSpacing: '0.18em', color: '#ef4444', marginBottom: '12px', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '8px' }}>
                                        <AlertTriangle size={12} /> LOST · {fmtMoney(stats.lost.reduce((s, d) => s + d.amount, 0))}
                                    </div>
                                    {stats.lost.map((d, i) => (
                                        <div key={i} style={{ display: 'grid', gridTemplateColumns: '2fr 80px 110px 110px 1fr', gap: '16px', padding: '12px 8px', borderBottom: '1px solid rgba(148,163,184,0.06)', fontSize: '13px', alignItems: 'center', opacity: 0.7 }}>
                                            <div style={{ color: '#cbd5e1', textDecoration: 'line-through', textDecorationColor: 'rgba(239,68,68,0.4)' }}>{d.name}</div>
                                            <div style={{ color: '#94a3b8', fontSize: '11px' }}>{d.quarter}</div>
                                            <div style={{ textAlign: 'right', color: '#ef4444' }}>{fmtMoney(d.amount)}</div>
                                            <div style={{ textAlign: 'right', color: '#94a3b8', fontSize: '11px' }}>{new Date(d.closeDate + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}</div>
                                            <div style={{ fontSize: '11px', color: '#64748b' }}>{d.stage}</div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Open pipeline */}
                        <div style={{ background: 'rgba(15,20,32,0.4)', border: '1px solid rgba(148,163,184,0.08)', borderRadius: '4px', padding: '28px' }}>
                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '20px', flexWrap: 'wrap', gap: '12px' }}>
                                <h2 style={{ fontFamily: '"Fraunces", Georgia, serif', fontSize: '24px', fontWeight: 400, margin: 0, color: '#f1f5f9' }}>
                                    Open Pipeline
                                    <span style={{ fontSize: '12px', color: '#64748b', marginLeft: '12px', fontFamily: '"JetBrains Mono", monospace' }}>
                                        {filteredDeals.length} deals · {selectedQuarter === 'all' ? 'all quarters' : quarterLabels[selectedQuarter]}
                                    </span>
                                </h2>
                                <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                                    {['all', 'Q1', 'Q2', 'Q3', 'Q4'].map(q => (
                                        <button key={q} onClick={() => setSelectedQuarter(q)} style={{ background: selectedQuarter === q ? 'rgba(16,185,129,0.15)' : 'transparent', border: `1px solid ${selectedQuarter === q ? '#10b981' : 'rgba(148,163,184,0.15)'}`, color: selectedQuarter === q ? '#10b981' : '#94a3b8', padding: '6px 12px', fontSize: '11px', letterSpacing: '0.1em', cursor: 'pointer', borderRadius: '2px', fontFamily: 'inherit', textTransform: 'uppercase' }}>{q}</button>
                                    ))}
                                    <div style={{ width: '1px', background: 'rgba(148,163,184,0.15)', margin: '0 4px' }} />
                                    {[{ k: 'weighted', l: 'Weighted' }, { k: 'amount', l: 'Amount' }, { k: 'confidence', l: 'Confidence' }].map(s => (
                                        <button key={s.k} onClick={() => setSortBy(s.k)} style={{ background: sortBy === s.k ? 'rgba(245,158,11,0.12)' : 'transparent', border: `1px solid ${sortBy === s.k ? '#f59e0b' : 'rgba(148,163,184,0.15)'}`, color: sortBy === s.k ? '#f59e0b' : '#94a3b8', padding: '6px 12px', fontSize: '11px', letterSpacing: '0.1em', cursor: 'pointer', borderRadius: '2px', fontFamily: 'inherit', textTransform: 'uppercase' }}>↕ {s.l}</button>
                                    ))}
                                </div>
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: '50px 2fr 80px 110px 100px 90px 1.6fr', gap: '16px', padding: '12px 8px', borderBottom: '1px solid rgba(148,163,184,0.1)', fontSize: '10px', letterSpacing: '0.15em', color: '#64748b' }}>
                                <div>SIGNAL</div><div>DEAL</div><div>QTR</div><div style={{ textAlign: 'right' }}>AMOUNT</div><div style={{ textAlign: 'right' }}>CONF.</div><div style={{ textAlign: 'right' }}>WEIGHTED</div><div>STAGE & SIGNAL</div>
                            </div>
                            {filteredDeals.map((d, i) => {
                                const sig = signalConfig[d.signal] || signalConfig.cold;
                                return (
                                    <div key={i} style={{ display: 'grid', gridTemplateColumns: '50px 2fr 80px 110px 100px 90px 1.6fr', gap: '16px', padding: '14px 8px', borderBottom: '1px solid rgba(148,163,184,0.06)', fontSize: '13px', alignItems: 'center' }}>
                                        <div><div style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: '32px', height: '20px', background: sig.bg, color: sig.color, fontSize: '9px', fontWeight: 700, letterSpacing: '0.1em', borderRadius: '2px' }}>{sig.label}</div></div>
                                        <div style={{ color: '#f1f5f9', fontWeight: 500 }}>{d.name}</div>
                                        <div style={{ color: '#94a3b8', fontSize: '11px' }}>{d.quarter}</div>
                                        <div style={{ textAlign: 'right', color: '#f1f5f9', fontWeight: 600 }}>{fmtMoney(d.amount)}</div>
                                        <div style={{ textAlign: 'right' }}><span style={{ color: (d.confidence||0) >= 0.6 ? '#10b981' : (d.confidence||0) >= 0.3 ? '#f59e0b' : '#94a3b8', fontWeight: 600 }}>{((d.confidence||0) * 100).toFixed(0)}%</span></div>
                                        <div style={{ textAlign: 'right', color: '#cbd5e1' }}>{fmtMoney(d.amount * (d.confidence||0))}</div>
                                        <div style={{ fontSize: '11px', color: '#94a3b8' }}>
                                            <div style={{ color: '#cbd5e1', marginBottom: '2px' }}>{d.stage}</div>
                                            <div style={{ color: '#64748b', fontSize: '10px' }}>{d.signalNote}</div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Footer notes */}
                        <div style={{ marginTop: '32px', padding: '20px', background: 'rgba(245,158,11,0.04)', border: '1px solid rgba(245,158,11,0.15)', borderRadius: '4px', fontSize: '12px', color: '#cbd5e1', lineHeight: 1.7 }}>
                            <div style={{ fontSize: '10px', letterSpacing: '0.2em', color: '#f59e0b', marginBottom: '10px', fontWeight: 600 }}>⚡ HOW TO READ THIS</div>
                            <strong style={{ color: '#f1f5f9' }}>Confidence</strong> = HubSpot stage probability adjusted by recent activity signals from Granola meetings and Slack DMs (last 60 days). HOT = active engagement, momentum confirmed. WARM = activity but stalled or competitive risk. COLD = no recent reply or stalled internally. <br/>
                            <strong style={{ color: '#f1f5f9' }}>Weighted</strong> = Amount × Confidence. Forecast = Closed Won + sum of all weighted pipeline.
                        </div>
                    </div>
                </div>
            );
        }

        // --- INIT: fetch data and render (runs after Babel transform) ---
        if (sessionStorage.getItem('authed') === '1') {
            fetch('/data/quota.json')
                .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
                .then(data => {
                    const root = ReactDOM.createRoot(document.getElementById('app'));
                    root.render(<QuotaDashboard deals={data.deals} metadata={data.metadata} />);
                })
                .catch(err => {
                    document.getElementById('app').innerHTML = '<div class="loading-msg" style="color:#ef4444;">Error loading data: ' + err.message + '</div>';
                });
        }

        // Expose for post-auth loading
        window.loadDashboard = function() {
            fetch('/data/quota.json')
                .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
                .then(data => {
                    const root = ReactDOM.createRoot(document.getElementById('app'));
                    root.render(<QuotaDashboard deals={data.deals} metadata={data.metadata} />);
                })
                .catch(err => {
                    document.getElementById('app').innerHTML = '<div class="loading-msg" style="color:#ef4444;">Error loading data: ' + err.message + '</div>';
                });
        };
    </script>

    <!-- Fallback: if auth happens after Babel has finished, call loadDashboard -->
    <script>
        const origShowContent = window.showContent || function(){};
        window.showContent = function() {
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            // Wait for Babel to finish transforming + expose loadDashboard
            function tryLoad() {
                if (typeof window.loadDashboard === 'function') {
                    window.loadDashboard();
                } else {
                    setTimeout(tryLoad, 200);
                }
            }
            tryLoad();
        };
    </script>
</body>
</html>
